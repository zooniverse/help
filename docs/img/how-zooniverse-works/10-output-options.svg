<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .source { fill: #FEF3C7; stroke: #F59E0B; stroke-width: 2; }
      .raw { fill: #EDE9FE; stroke: #7C3AED; stroke-width: 2; }
      .raw-fill { fill: #7C3AED; }
      .aggregated { fill: #CCFBF1; stroke: #00979D; stroke-width: 2; }
      .aggregated-fill { fill: #00979D; }
      .use-case { fill: #F1F5F9; stroke: #64748B; stroke-width: 1; }

      .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 11px; font-weight: 600; fill: #1E293B; }
      .sublabel { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 9px; fill: #64748B; }
      .header { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 12px; font-weight: 700; fill: white; }
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 16px; font-weight: 700; fill: #1E293B; }
      .question { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; font-style: italic; fill: #7C3AED; }
      .arrow { fill: none; stroke: #94A3B8; stroke-width: 2; marker-end: url(#arrowhead); }
      .code { font-family: 'SF Mono', Monaco, monospace; font-size: 8px; fill: #475569; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Output Options: Raw vs. Aggregated Data</text>
  <text x="400" y="50" text-anchor="middle" class="question">"What level of accuracy do I need?"</text>

  <!-- Source -->
  <rect x="340" y="70" width="120" height="60" rx="8" class="source"/>
  <text x="400" y="95" text-anchor="middle" class="label">Classifications</text>
  <text x="400" y="112" text-anchor="middle" class="sublabel">Raw volunteer data</text>

  <path d="M 340 100 L 200 100 L 200 150" class="arrow"/>
  <path d="M 460 100 L 600 100 L 600 150" class="arrow"/>

  <!-- Raw Data Column -->
  <rect x="60" y="150" width="280" height="320" rx="8" class="raw"/>
  <rect x="60" y="150" width="280" height="35" rx="8" class="raw-fill"/>
  <rect x="60" y="175" width="280" height="10" class="raw-fill"/>
  <text x="200" y="175" text-anchor="middle" class="header">Raw Classifications</text>

  <text x="200" y="210" text-anchor="middle" class="label">Every individual response</text>

  <!-- Example data -->
  <rect x="80" y="225" width="240" height="80" rx="4" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="95" y="245" class="code">subject_1: [</text>
  <text x="105" y="258" class="code">{user: A, answer: "Yes"},</text>
  <text x="105" y="271" class="code">{user: B, answer: "Yes"},</text>
  <text x="105" y="284" class="code">{user: C, answer: "No"}</text>
  <text x="95" y="297" class="code">]</text>

  <!-- Pros/Cons -->
  <text x="90" y="330" class="sublabel" style="fill: #10B981;">+ Full transparency</text>
  <text x="90" y="345" class="sublabel" style="fill: #10B981;">+ Custom aggregation</text>
  <text x="90" y="360" class="sublabel" style="fill: #10B981;">+ ML training data</text>
  <text x="90" y="375" class="sublabel" style="fill: #10B981;">+ Audit trail</text>

  <text x="90" y="400" class="sublabel" style="fill: #EF4444;">- Large files</text>
  <text x="90" y="415" class="sublabel" style="fill: #EF4444;">- Requires processing</text>
  <text x="90" y="430" class="sublabel" style="fill: #EF4444;">- More complex analysis</text>

  <!-- Use cases -->
  <rect x="80" y="445" width="240" height="20" rx="4" class="use-case"/>
  <text x="200" y="459" text-anchor="middle" class="sublabel">Best for: ML, research, auditing</text>

  <!-- Aggregated Data Column -->
  <rect x="460" y="150" width="280" height="320" rx="8" class="aggregated"/>
  <rect x="460" y="150" width="280" height="35" rx="8" class="aggregated-fill"/>
  <rect x="460" y="175" width="280" height="10" class="aggregated-fill"/>
  <text x="600" y="175" text-anchor="middle" class="header">Aggregated / Consensus</text>

  <text x="600" y="210" text-anchor="middle" class="label">Combined result per subject</text>

  <!-- Example data -->
  <rect x="480" y="225" width="240" height="80" rx="4" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="495" y="245" class="code">subject_1: {</text>
  <text x="505" y="258" class="code">consensus: "Yes",</text>
  <text x="505" y="271" class="code">agreement: 0.67,</text>
  <text x="505" y="284" class="code">count: 3</text>
  <text x="495" y="297" class="code">}</text>

  <!-- Pros/Cons -->
  <text x="490" y="330" class="sublabel" style="fill: #10B981;">+ Ready to use</text>
  <text x="490" y="345" class="sublabel" style="fill: #10B981;">+ Smaller files</text>
  <text x="490" y="360" class="sublabel" style="fill: #10B981;">+ Direct answers</text>
  <text x="490" y="375" class="sublabel" style="fill: #10B981;">+ Confidence scores</text>

  <text x="490" y="400" class="sublabel" style="fill: #EF4444;">- Less flexibility</text>
  <text x="490" y="415" class="sublabel" style="fill: #EF4444;">- Fixed algorithm</text>
  <text x="490" y="430" class="sublabel" style="fill: #EF4444;">- No individual data</text>

  <!-- Use cases -->
  <rect x="480" y="445" width="240" height="20" rx="4" class="use-case"/>
  <text x="600" y="459" text-anchor="middle" class="sublabel">Best for: Quick analysis, catalogs</text>
</svg>