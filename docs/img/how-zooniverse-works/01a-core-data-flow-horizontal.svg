<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <style>
      /* Zooniverse-inspired color palette */
      .data-in { fill: #F59E0B; }
      .data-in-light { fill: #FEF3C7; stroke: #F59E0B; }
      .zoo-core { fill: #00979D; }
      .zoo-core-light { fill: #CCFBF1; stroke: #00979D; }
      .transform { fill: #7C3AED; }
      .transform-light { fill: #EDE9FE; stroke: #7C3AED; }
      .output { fill: #10B981; }
      .output-light { fill: #D1FAE5; stroke: #10B981; }

      .box { stroke-width: 2; rx: 8; }
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; font-weight: 600; }
      .sublabel { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 11px; fill: #64748B; }
      .arrow { fill: none; stroke: #94A3B8; stroke-width: 2; marker-end: url(#arrowhead); }
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 16px; font-weight: 700; fill: #1E293B; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Core Data Flow (Horizontal)</text>

  <!-- Subjects Box -->
  <rect x="40" y="70" width="140" height="80" class="box data-in-light"/>
  <rect x="40" y="70" width="140" height="8" class="data-in" rx="8" ry="0"/>
  <text x="110" y="115" text-anchor="middle" class="label">Subjects</text>
  <text x="110" y="132" text-anchor="middle" class="sublabel">Your research data</text>

  <!-- Arrow 1 -->
  <path d="M 185 110 L 250 110" class="arrow"/>

  <!-- Project + Workflow Box -->
  <rect x="260" y="60" width="200" height="100" class="box zoo-core-light"/>
  <rect x="260" y="60" width="200" height="8" class="zoo-core" rx="8" ry="0"/>
  <text x="360" y="105" text-anchor="middle" class="label">Project + Workflow</text>
  <text x="360" y="122" text-anchor="middle" class="sublabel">Tasks volunteers perform</text>
  <text x="360" y="138" text-anchor="middle" class="sublabel">on your data</text>

  <!-- Arrow 2 -->
  <path d="M 465 110 L 530 110" class="arrow"/>

  <!-- Annotations Box -->
  <rect x="540" y="70" width="140" height="80" class="box output-light"/>
  <rect x="540" y="70" width="140" height="8" class="output" rx="8" ry="0"/>
  <text x="610" y="115" text-anchor="middle" class="label">Annotations</text>
  <text x="610" y="132" text-anchor="middle" class="sublabel">Volunteer responses</text>

  <!-- Legend -->
  <rect x="720" y="70" width="12" height="12" class="data-in"/>
  <text x="738" y="80" class="sublabel">Data In</text>
  <rect x="720" y="90" width="12" height="12" class="zoo-core"/>
  <text x="738" y="100" class="sublabel">Zooniverse</text>
  <rect x="720" y="110" width="12" height="12" class="output"/>
  <text x="738" y="120" class="sublabel">Output</text>
</svg>