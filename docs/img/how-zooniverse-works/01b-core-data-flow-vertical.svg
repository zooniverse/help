<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 450">
  <defs>
    <style>
      .data-in { fill: #F59E0B; }
      .data-in-light { fill: #FEF3C7; stroke: #F59E0B; }
      .zoo-core { fill: #00979D; }
      .zoo-core-light { fill: #CCFBF1; stroke: #00979D; }
      .output { fill: #10B981; }
      .output-light { fill: #D1FAE5; stroke: #10B981; }

      .box { stroke-width: 2; }
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; font-weight: 600; fill: #1E293B; }
      .sublabel { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 11px; fill: #64748B; }
      .arrow { fill: none; stroke: #94A3B8; stroke-width: 2; marker-end: url(#arrowhead); }
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 16px; font-weight: 700; fill: #1E293B; }
      .phase-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" class="title">Core Data Flow (Vertical)</text>

  <!-- Phase Labels -->
  <text x="60" y="95" class="phase-label data-in">INPUT</text>
  <text x="60" y="215" class="phase-label zoo-core">PROCESS</text>
  <text x="60" y="365" class="phase-label output">OUTPUT</text>

  <!-- Subjects Box -->
  <rect x="100" y="60" width="200" height="70" class="box data-in-light" rx="8"/>
  <circle cx="200" cy="75" r="15" class="data-in"/>
  <text x="200" y="80" text-anchor="middle" fill="white" style="font-size: 12px; font-weight: bold;">1</text>
  <text x="200" y="105" text-anchor="middle" class="label">Subjects</text>
  <text x="200" y="120" text-anchor="middle" class="sublabel">Images, audio, video, documents</text>

  <!-- Arrow 1 -->
  <path d="M 200 135 L 200 170" class="arrow"/>

  <!-- Project + Workflow Box -->
  <rect x="100" y="180" width="200" height="100" class="box zoo-core-light" rx="8"/>
  <circle cx="200" cy="195" r="15" class="zoo-core"/>
  <text x="200" y="200" text-anchor="middle" fill="white" style="font-size: 12px; font-weight: bold;">2</text>
  <text x="200" y="230" text-anchor="middle" class="label">Project + Workflow</text>
  <text x="200" y="248" text-anchor="middle" class="sublabel">Define what volunteers</text>
  <text x="200" y="263" text-anchor="middle" class="sublabel">should do with your data</text>

  <!-- Arrow 2 -->
  <path d="M 200 285 L 200 320" class="arrow"/>

  <!-- Annotations Box -->
  <rect x="100" y="330" width="200" height="70" class="box output-light" rx="8"/>
  <circle cx="200" cy="345" r="15" class="output"/>
  <text x="200" y="350" text-anchor="middle" fill="white" style="font-size: 12px; font-weight: bold;">3</text>
  <text x="200" y="375" text-anchor="middle" class="label">Annotations</text>
  <text x="200" y="390" text-anchor="middle" class="sublabel">Classifications from volunteers</text>
</svg>